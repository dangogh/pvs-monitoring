name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          GOARCH=arm64 GOOS=darwin go build -ldflags="-s -w" -o bin/pvs-monitor ./cmd/pvs-monitor
          GOARCH=arm64 GOOS=darwin go build -ldflags="-s -w" -o bin/pvs-mcp     ./cmd/pvs-mcp
          GOARCH=arm64 GOOS=darwin go build -ldflags="-s -w" -o bin/pvs-api     ./cmd/pvs-api
          GOARCH=arm64 GOOS=darwin go build -ldflags="-s -w" -o bin/pvs-ui      ./cmd/pvs-ui
      - name: Archive
        run: tar -czf pvs-monitoring-darwin-arm64.tar.gz -C bin pvs-monitor pvs-mcp pvs-api pvs-ui
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: pvs-monitoring-darwin-arm64.tar.gz

  build-deb:
    name: Build Debian package (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build .deb
        run: make deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb-arm64
          path: dist/*.deb

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-deb]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pvs-monitoring-darwin-arm64.tar.gz
            *.deb
          generate_release_notes: true
