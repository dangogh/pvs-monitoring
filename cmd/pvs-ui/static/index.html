<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Monitor</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --solar:     #f59e0b;
      --load:      #60a5fa;
      --export:    #34d399;
      --import:    #f87171;
      --radius:    0.5rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 1.25rem; font-weight: 600; }

    #clock { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.9rem; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Tabs ────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      margin-bottom: -1px;
    }

    .tab-btn[aria-selected="true"] {
      border-bottom-color: var(--solar);
      color: var(--text);
      font-weight: 600;
    }

    .tab-btn:focus { outline: 2px solid var(--solar); outline-offset: 2px; }

    .tab-panel { display: none; flex-direction: column; gap: 1.25rem; }
    .tab-panel.active { display: flex; }

    /* ── Section headings ───────────────────────────────────── */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 600;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--export);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    .pulse-dot.stale {
      background: var(--muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    #now-timestamp { font-variant-numeric: tabular-nums; }

    /* ── Current power cards ─────────────────────────────────── */
    .current-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-unit { font-size: 1rem; color: var(--muted); }

    .production .stat-value { color: var(--solar); }
    .usage      .stat-value { color: var(--load); }
    .net-export .stat-value { color: var(--export); }
    .net-import .stat-value { color: var(--import); }

    /* ── Range selector ──────────────────────────────────────── */
    .range-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }

    .range-row label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #range-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.4rem 0.75rem;
    }

    #range-select:focus { outline: 2px solid var(--solar); outline-offset: 2px; }

    .custom-range {
      display: none;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .custom-range.visible { display: flex; }

    .custom-range label { color: var(--muted); font-size: 0.85rem; }

    .custom-range input[type="date"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.35rem 0.6rem;
    }

    .custom-range input[type="date"]:focus { outline: 2px solid var(--solar); outline-offset: 2px; }

    #apply-custom {
      background: var(--solar);
      border: none;
      border-radius: var(--radius);
      color: #000;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem 0.85rem;
    }

    #apply-custom:focus { outline: 2px solid var(--text); outline-offset: 2px; }

    /* ── Chart ───────────────────────────────────────────────── */
    #chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    #chart { height: 380px; }

    #no-data {
      display: none;
      height: 380px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── Summary cards ───────────────────────────────────────── */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    #period-label { font-variant-numeric: tabular-nums; }

    .summary-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .summary-value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .summary-unit  { font-size: 0.85rem; color: var(--muted); }

    /* ── Panels table ────────────────────────────────────────── */
    #panels-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      position: relative;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30,41,59,0.7);
      border-radius: var(--radius);
      z-index: 10;
    }

    .spinner {
      width: 1.5rem;
      height: 1.5rem;
      border: 2px solid var(--border);
      border-top-color: var(--solar);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #map-layout { position: relative; }

    #panels-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
    }

    #panels-table th, #panels-table td {
      padding: 0.5rem 0.75rem;
      text-align: right;
      white-space: nowrap;
    }

    #panels-table th:first-child, #panels-table td:first-child { text-align: left; }

    #panels-table thead th {
      background: var(--bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
    }

    #panels-table thead th:hover { color: var(--text); }

    #panels-table thead th[aria-sort="ascending"]::after  { content: ' ▲'; }
    #panels-table thead th[aria-sort="descending"]::after { content: ' ▼'; }

    #panels-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    #panels-table tbody tr:hover           { background: rgba(255,255,255,0.05); }
    #panels-table tfoot td {
      background: var(--bg);
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      text-align: right;
      white-space: nowrap;
      position: sticky;
      bottom: 0;
    }
    #panels-table tfoot td:first-child { text-align: left; }

    .state-working { color: var(--export); }
    .state-error   { color: var(--import); }
    .state-other   { color: var(--muted); }

    /* ── Panel detail (inline accordion) ───────────────────── */
    #panels-table tbody tr.panel-row { cursor: pointer; }
    #panels-table tbody tr.panel-row.expanded { background: rgba(245,158,11,0.1); }
    #panels-table tbody tr.panel-row:hover { background: rgba(255,255,255,0.05); }
    #panels-table tbody tr.panel-row.expanded:hover { background: rgba(245,158,11,0.15); }

    tr.detail-row td {
      padding: 0.75rem 1rem 1rem;
      background: rgba(245,158,11,0.05);
      border-bottom: 1px solid var(--border);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.75rem;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .detail-value .detail-unit {
      font-size: 0.8rem;
      font-weight: normal;
      color: var(--muted);
      margin-left: 0.2em;
    }

    /* ── Map tab ─────────────────────────────────────────────── */
    #map-container { background: var(--bg); border-radius: var(--radius); padding: 1rem; }
    #map-container h1     { color: var(--text); }
    #map-container .label { color: var(--muted); }
    #map-container .panel {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    #map-layout {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
    }

    #map-container {
      overflow: auto;
      flex: 1 1 auto;
      min-width: 0;
    }

    #map-container .panel { cursor: pointer; transition: opacity 0.15s; }
    #map-container .panel.state-working  { background: #166534; color: #bbf7d0; }
    #map-container .panel.state-error    { background: #7f1d1d; color: #fecaca; }
    #map-container .panel.state-other    { background: #374151; color: #9ca3af; }
    #map-container .panel.state-unknown  { background: #1e293b; color: #475569; }
    #map-container .panel:hover          { opacity: 0.75; }
    #map-container .panel.selected       { outline: 2px solid var(--solar); }

    #map-detail {
      flex: 0 0 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    #map-detail.visible { display: flex; }

    #map-detail-title {
      font-size: 0.95rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .map-detail-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .map-detail-section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.2rem;
      margin-bottom: 0.1rem;
    }

    .map-detail-section .detail-grid {
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.4rem 0.75rem;
    }

    /* ── Status bar ──────────────────────────────────────────── */
    #status {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding-bottom: 0.75rem;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 700px) {
      .current-stats  { grid-template-columns: 1fr; }
      .summary-cards  { grid-template-columns: repeat(2, 1fr); }
      .stat-value     { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>☀ Solar Monitor</h1>
  <time id="clock" aria-live="off"></time>
</header>

<main>

  <div class="tab-bar" role="tablist" aria-label="Views">
    <button class="tab-btn" role="tab" aria-selected="true"  aria-controls="tab-overview" id="btn-overview">Overview</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-panels"   id="btn-panels">Panels</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-map"      id="btn-map" style="display:none">Map</button>
  </div>

  <!-- Overview tab -->
  <div id="tab-overview" class="tab-panel active" role="tabpanel" aria-labelledby="btn-overview">

    <div class="section-heading">
      <span class="pulse-dot" id="now-dot"></span>
      <span>Now</span>
      <span id="now-timestamp"></span>
    </div>
    <section aria-label="Current power readings" aria-live="polite" aria-atomic="true" class="current-stats">
      <div class="stat-card production" role="group" aria-label="Solar production">
        <span class="stat-label">Production</span>
        <div class="stat-row">
          <span class="stat-value" id="solar-kw">—</span>
          <span class="stat-unit">kW</span>
        </div>
      </div>
      <div class="stat-card usage" role="group" aria-label="Home usage">
        <span class="stat-label">Usage</span>
        <div class="stat-row">
          <span class="stat-value" id="load-kw">—</span>
          <span class="stat-unit">kW</span>
        </div>
      </div>
      <div class="stat-card" id="net-card" role="group" aria-label="Grid exchange">
        <span class="stat-label" id="net-label">Net</span>
        <div class="stat-row">
          <span class="stat-value" id="net-kw">—</span>
          <span class="stat-unit">kW</span>
        </div>
      </div>
    </section>

    <div class="section-heading">
      <span id="period-label">Period</span>
    </div>
    <section aria-label="Period summary" class="summary-cards">
      <div class="summary-card" role="group" aria-label="Energy produced">
        <span class="summary-label">Produced</span>
        <span class="summary-value" id="sum-solar">—</span>
        <span class="summary-unit">kWh</span>
      </div>
      <div class="summary-card" role="group" aria-label="Energy consumed">
        <span class="summary-label">Consumed</span>
        <span class="summary-value" id="sum-load">—</span>
        <span class="summary-unit">kWh</span>
      </div>
      <div class="summary-card" role="group" aria-label="Net energy">
        <span class="summary-label">Net</span>
        <span class="summary-value" id="sum-net">—</span>
        <span class="summary-unit">kWh</span>
      </div>
      <div class="summary-card" role="group" aria-label="Average production">
        <span class="summary-label">Avg Production</span>
        <span class="summary-value" id="sum-avg">—</span>
        <span class="summary-unit">kW</span>
      </div>
    </section>

    <div class="range-row">
      <label for="range-select">Time range:</label>
      <select id="range-select" aria-label="Select time range">
        <option value="today">Today</option>
        <option value="this_week">This Week</option>
        <option value="this_month">This Month</option>
        <option value="this_year">This Year</option>
        <option value="past_24h">Past 24 Hours</option>
        <option value="past_7d">Past 7 Days</option>
        <option value="past_30d">Past 30 Days</option>
        <option value="past_year">Past Year</option>
        <option value="lifetime">Lifetime</option>
        <option value="custom">Custom…</option>
      </select>
      <div class="custom-range" id="custom-range" role="group" aria-label="Custom date range">
        <label for="custom-since">From</label>
        <input type="date" id="custom-since" aria-label="Start date">
        <label for="custom-until">To</label>
        <input type="date" id="custom-until" aria-label="End date">
        <button id="apply-custom">Apply</button>
      </div>
    </div>

    <section aria-label="Power chart" id="chart-container">
      <div id="chart"></div>
      <div id="no-data" role="status">No data for this period.</div>
    </section>

  </div><!-- /tab-overview -->

  <!-- Panels tab -->
  <div id="tab-panels" class="tab-panel" role="tabpanel" aria-labelledby="btn-panels">
    <div id="panels-container">
      <table id="panels-table" aria-label="Panel inverter readings">
        <thead>
          <tr>
            <th scope="col" data-col="label"        aria-sort="ascending">Label</th>
            <th scope="col" data-col="state"        style="max-width:6rem">State</th>
            <th scope="col" data-col="serial"                             >Serial</th>
            <th scope="col" data-col="power_kw"                          >kW</th>
            <th scope="col" data-col="today_kwh"                         >Today (kWh)</th>
            <th scope="col" data-col="lifetime_kwh"                      >Lifetime (kWh)</th>
            <th scope="col" data-col="voltage_v"                         >Voltage (V)</th>
            <th scope="col" data-col="temp_c"                            >Temp (°C)</th>
          </tr>
        </thead>
        <tbody id="panels-tbody"></tbody>
        <tfoot id="panels-tfoot"></tfoot>
      </table>
    </div>
  </div><!-- /tab-panels -->

  <!-- Map tab -->
  <div id="tab-map" class="tab-panel" role="tabpanel" aria-labelledby="btn-map">
    <div id="map-layout">
      <div id="map-container"></div>
      <div id="map-detail" aria-live="polite">
        <div id="map-detail-title"></div>
        <div class="detail-grid" id="map-detail-grid"></div>
      </div>
    </div>
  </div><!-- /tab-map -->

  <p id="status" aria-live="polite"></p>

</main>

<script>
'use strict';

let chart = null;
let currentRange = 'today';

// ── Clock ─────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(tickClock, 1000);
tickClock();

// ── Formatting ────────────────────────────────────────────────
function fmt1(n)  { return n == null ? '—' : n.toFixed(1); }
function fmt2(n)  { return n == null ? '—' : n.toFixed(2); }
function fmtKWh(n){ return n == null ? '—' : n.toFixed(2); }

// ── Tabs ──────────────────────────────────────────────────────
const tabBtns   = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-panel');

let activeTab = 'tab-overview';

function switchTab(id) {
  activeTab = id;
  tabBtns.forEach(b => {
    const active = b.getAttribute('aria-controls') === id;
    b.setAttribute('aria-selected', active);
  });
  tabPanels.forEach(p => p.classList.toggle('active', p.id === id));
  if (id === 'tab-panels') loadPanels();
  if (id === 'tab-map')    loadMap();
}

tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.getAttribute('aria-controls'))));

// ── Current reading ───────────────────────────────────────────
function updateCurrent(c) {
  if (!c) return;
  document.getElementById('solar-kw').textContent = fmt1(c.solar_kw);
  document.getElementById('load-kw').textContent  = fmt1(c.load_kw);
  document.querySelector('.stat-card.production').setAttribute('aria-label', 'Solar production: ' + fmt1(c.solar_kw) + ' kilowatts');
  document.querySelector('.stat-card.usage').setAttribute('aria-label', 'Home usage: ' + fmt1(c.load_kw) + ' kilowatts');

  const netKW   = c.net_kw;
  const netEl   = document.getElementById('net-kw');
  const labelEl = document.getElementById('net-label');
  const cardEl  = document.getElementById('net-card');

  const exporting = netKW <= 0;
  netEl.textContent   = fmt1(Math.abs(netKW));
  labelEl.textContent = exporting ? 'Exporting' : 'Importing';
  cardEl.className    = 'stat-card ' + (exporting ? 'net-export' : 'net-import');
  cardEl.setAttribute('aria-label', (exporting ? 'Exporting to grid: ' : 'Importing from grid: ') + fmt1(Math.abs(netKW)) + ' kilowatts');

  const updatedAt = new Date(c.updated_at);
  const age = Math.round((Date.now() - updatedAt.getTime()) / 1000);
  const stale = age > 120;
  const timeStr = updatedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('now-timestamp').textContent = timeStr;
  document.getElementById('now-dot').classList.toggle('stale', stale);

  let ageStr;
  if      (age < 5)     ageStr = 'just now';
  else if (age < 60)    ageStr = age + 's ago';
  else if (age < 3600)  ageStr = Math.floor(age / 60) + 'm ago';
  else if (age < 86400) ageStr = Math.floor(age / 3600) + 'h ago';
  else                  ageStr = Math.floor(age / 86400) + 'd ago';
  document.getElementById('status').textContent = 'Last reading ' + ageStr;
}

// ── Summary cards ─────────────────────────────────────────────
function updateSummary(s, label) {
  if (label) document.getElementById('period-label').textContent = label;
  document.getElementById('sum-solar').textContent = fmtKWh(s.solar_kwh);
  document.getElementById('sum-load').textContent  = fmtKWh(s.load_kwh);
  document.getElementById('sum-avg').textContent   = fmt1(s.avg_solar_kw);
  document.getElementById('sum-solar').parentElement.setAttribute('aria-label', 'Energy produced: ' + fmtKWh(s.solar_kwh) + ' kilowatt-hours');
  document.getElementById('sum-load').parentElement.setAttribute('aria-label', 'Energy consumed: ' + fmtKWh(s.load_kwh) + ' kilowatt-hours');
  document.getElementById('sum-avg').parentElement.setAttribute('aria-label', 'Average production: ' + fmt1(s.avg_solar_kw) + ' kilowatts');

  const netEl = document.getElementById('sum-net');
  const net   = s.net_kwh;
  netEl.textContent = fmtKWh(Math.abs(net));
  const netUnit = net < 0 ? 'kWh exported' : 'kWh imported';
  netEl.parentElement.querySelector('.summary-unit').textContent = netUnit;
  netEl.parentElement.setAttribute('aria-label', (net < 0 ? 'Net energy exported: ' : 'Net energy imported: ') + fmtKWh(Math.abs(net)) + ' kilowatt-hours');
}

// ── Chart ─────────────────────────────────────────────────────
function buildChartOptions(series, rangeLabel, since, until) {
  const solar = series.map(p => [p.t, p.s == null ? null : parseFloat(p.s.toFixed(3))]);
  const load  = series.map(p => [p.t, p.l == null ? null : parseFloat(p.l.toFixed(3))]);

  return {
    time: { useUTC: false },
    chart: {
      backgroundColor: 'transparent',
      style: { fontFamily: 'inherit', color: '#f1f5f9' },
      animation: false,
      zoomType: 'x',
      resetZoomButton: {
        theme: {
          fill: '#1e293b',
          stroke: '#334155',
          style: { color: '#f1f5f9' },
          states: { hover: { fill: '#334155' } },
        },
      },
    },
    title: { text: null },
    credits: { enabled: false },
    legend: {
      itemStyle: { color: '#f1f5f9', fontWeight: 'normal' },
      itemHoverStyle: { color: '#fff' },
    },
    xAxis: {
      type: 'datetime',
      min: since * 1000,
      max: until * 1000,
      lineColor: '#334155',
      tickColor: '#334155',
      labels: { style: { color: '#94a3b8' } },
    },
    yAxis: {
      title: { text: 'kW', style: { color: '#94a3b8' } },
      gridLineColor: '#334155',
      labels: { style: { color: '#94a3b8' }, format: '{value:.1f}' },
      min: 0,
    },
    tooltip: {
      shared: true,
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      style: { color: '#f1f5f9' },
      valueDecimals: 2,
      valueSuffix: ' kW',
    },
    plotOptions: {
      area: { marker: { enabled: false } },
      line: { marker: { enabled: false } },
    },
    series: [
      {
        name: 'Production',
        type: 'area',
        data: solar,
        color: '#f59e0b',
        fillOpacity: 0.15,
        lineWidth: 2,
      },
      {
        name: 'Usage',
        type: 'line',
        data: load,
        color: '#60a5fa',
        lineWidth: 2,
      },
    ],
    accessibility: {
      enabled: true,
      description: 'Solar production and home energy usage over time for ' + rangeLabel + '.',
      point: { valueDescriptionFormat: '{xDescription}: production {point.y:.2f} kW' },
      series: { descriptionFormat: '{seriesDescription}' },
      screenReaderSection: {
        beforeChartFormat:
          '<h3>Solar production and usage — {rangeLabel}</h3>' +
          '<div>Line chart with two series: solar production in amber, home usage in blue.</div>' +
          '<div>{chartLongdesc}</div>',
      },
      keyboardNavigation: { enabled: true },
    },
    exporting: { enabled: false },
  };
}

function renderChart(series, rangeLabel, since, until) {
  const noData  = document.getElementById('no-data');
  const chartEl = document.getElementById('chart');

  if (!series || series.length === 0) {
    chartEl.style.display = 'none';
    noData.style.display  = 'flex';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  chartEl.style.display = 'block';
  noData.style.display  = 'none';

  if (chart) { try { chart.destroy(); } catch (_) {} chart = null; }
  chart = Highcharts.chart('chart', buildChartOptions(series, rangeLabel, since, until));
}

// ── API base ──────────────────────────────────────────────────
let API_BASE = '';

// ── Range resolution ──────────────────────────────────────────
function resolveRange(name, customSince, customUntil) {
  const now   = new Date();
  const y     = now.getFullYear();
  const m     = now.getMonth();
  const d     = now.getDate();
  const today = new Date(y, m, d);
  const until = Math.floor(now / 1000);

  switch (name) {
    case 'today':
      return { since: Math.floor(today / 1000), until, label: 'Today' };
    case 'this_week': {
      const dow = now.getDay();
      return { since: Math.floor(new Date(y, m, d - dow) / 1000), until, label: 'This Week' };
    }
    case 'this_month':
      return { since: Math.floor(new Date(y, m, 1) / 1000), until, label: 'This Month' };
    case 'this_year':
      return { since: Math.floor(new Date(y, 0, 1) / 1000), until, label: 'This Year' };
    case 'past_24h':
      return { since: until - 86400, until, label: 'Past 24 Hours' };
    case 'past_7d':
      return { since: until - 7 * 86400, until, label: 'Past 7 Days' };
    case 'past_30d':
      return { since: until - 30 * 86400, until, label: 'Past 30 Days' };
    case 'past_year':
      return { since: Math.floor(new Date(y - 1, m, d) / 1000), until, label: 'Past Year' };
    case 'lifetime':
      return { since: 0, until, label: 'Lifetime' };
    case 'custom': {
      const s = Math.floor(new Date(customSince) / 1000);
      const u = Math.floor(new Date(customUntil) / 1000) + 86399;
      return { since: s, until: u, label: customSince + ' – ' + customUntil };
    }
    default:
      return { since: Math.floor(today / 1000), until, label: 'Today' };
  }
}

// ── Overview data loading ─────────────────────────────────────
async function loadRange(name, customSince, customUntil) {
  const { since, until, label } = resolveRange(name, customSince, customUntil);
  try {
    const url = API_BASE + '/api/data?since=' + since + '&until=' + until;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    updateCurrent(data.current);
    updateSummary(data.summary, label);
    const chartSince = data.earliest_at ? Math.max(since, Math.floor(new Date(data.earliest_at) / 1000)) : since;
    renderChart(data.series, label, chartSince, until);
  } catch (e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

async function refreshCurrent() {
  try {
    const resp = await fetch(API_BASE + '/api/current');
    if (!resp.ok) return;
    updateCurrent(await resp.json());
  } catch (_) {}
}

// ── Panels table ──────────────────────────────────────────────
let panelsData      = [];
let panelsFetchedAt = 0;
const DEVICES_REFRESH_MS = 30_000;
const PANELS_TTL_MS      = DEVICES_REFRESH_MS;
let sortCol         = 'label';
let sortAsc         = true;
let expandedSerials = new Set();

async function fetchDevices() {
  const resp = await fetch(API_BASE + '/api/devices');
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  panelsData = await resp.json();
  panelsFetchedAt = Date.now();
}

async function loadPanels() {
  const stale = panelsData.length === 0 || Date.now() - panelsFetchedAt > PANELS_TTL_MS;
  if (panelsData.length > 0) renderPanels(); // render immediately from cache
  if (!stale) return;

  const container = document.getElementById('panels-container');
  let overlay;
  if (panelsData.length === 0) {
    overlay = document.createElement('div');
    overlay.className = 'loading-overlay';
    overlay.innerHTML = '<div class="spinner"></div>';
    container.appendChild(overlay);
  }
  try {
    await fetchDevices();
    renderPanels();
  } catch (e) {
    if (panelsData.length === 0)
      document.getElementById('panels-tbody').innerHTML =
        '<tr><td colspan="8" style="text-align:center;color:var(--muted)">Error: ' + e.message + '</td></tr>';
  } finally {
    overlay?.remove();
  }
}

function renderPanels() {
  const cols = {
    label:        d => serialToLabel[d.serial] || '',
    serial:       d => d.serial,
    state:        d => d.state_descr,
    power_kw:     d => d.power_kw,
    today_kwh:    d => d.today_kwh,
    lifetime_kwh: d => d.lifetime_kwh,
    voltage_v:    d => d.voltage_v,
    temp_c:       d => d.temp_c,
  };

  const sorted = [...panelsData].sort((a, b) => {
    const av = cols[sortCol](a);
    const bv = cols[sortCol](b);
    const cmp = typeof av === 'string' ? av.localeCompare(bv, undefined, { numeric: true }) : av - bv;
    return sortAsc ? cmp : -cmp;
  });

  const tbody = document.getElementById('panels-tbody');
  const rows = [];
  sorted.forEach(d => {
    const stateClass = d.state === 'working' ? 'state-working'
                     : d.state === 'error'   ? 'state-error'
                     : 'state-other';
    const expanded = expandedSerials.has(d.serial);
    const label = serialToLabel[d.serial] || '—';
    rows.push(`<tr class="panel-row${expanded ? ' expanded' : ''}" data-serial="${d.serial}" tabindex="0" aria-expanded="${expanded}">
      <td>${label}</td>
      <td class="${stateClass}" style="max-width:6rem;overflow:hidden;text-overflow:ellipsis">${d.state_descr}</td>
      <td>${d.serial}</td>
      <td>${fmt1(d.power_kw)}</td>
      <td>${fmt1(d.today_kwh)}</td>
      <td>${fmt1(d.lifetime_kwh)}</td>
      <td>${fmt1(d.voltage_v)}</td>
      <td>${fmt1(d.temp_c)}</td>
    </tr>`);
    if (expanded) rows.push(detailRow(d));
  });
  tbody.innerHTML = rows.join('');

  // Summary row
  const n = panelsData.length;
  if (n > 0) {
    const sum = (fn) => panelsData.reduce((acc, d) => acc + fn(d), 0);
    const avg = (fn) => sum(fn) / n;
    const ftd = (label, val) =>
      `<td><span style="color:var(--muted);font-weight:400;margin-right:0.3em;font-size:0.72rem">${label}</span>${val}</td>`;
    document.getElementById('panels-tfoot').innerHTML = `<tr>
      <td>${n} panels</td>
      <td></td>
      <td></td>
      ${ftd('total', fmt1(sum(d => d.power_kw)))}
      ${ftd('total', fmt1(sum(d => d.today_kwh)))}
      ${ftd('total', fmt1(sum(d => d.lifetime_kwh)))}
      ${ftd('avg', fmt1(avg(d => d.voltage_v)))}
      ${ftd('avg', fmt1(avg(d => d.temp_c)))}
    </tr>`;
  }

  tbody.querySelectorAll('tr.panel-row').forEach(tr => {
    tr.addEventListener('click', () => togglePanel(tr.dataset.serial));
    tr.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePanel(tr.dataset.serial); }
    });
  });
}

function detailRow(d) {
  const fields = [
    { label: 'State',         value: d.state_descr,          unit: ''    },
    { label: 'Power',         value: fmt1(d.power_kw),        unit: 'kW'  },
    { label: 'Today',         value: fmt1(d.today_kwh),       unit: 'kWh' },
    { label: 'Current',       value: fmt1(d.current_a),       unit: 'A'   },
    { label: 'Voltage (AC)',  value: fmt1(d.voltage_v),       unit: 'V'   },
    { label: 'Frequency',     value: fmt1(d.freq_hz),         unit: 'Hz'  },
    { label: 'MPPT1 Power',   value: fmt1(d.power_mppt1_kw),  unit: 'kW'  },
    { label: 'MPPT1 Voltage', value: fmt1(d.voltage_mppt1_v), unit: 'V'   },
    { label: 'MPPT1 Current', value: fmt1(d.current_mppt1_a), unit: 'A'   },
    { label: 'Temperature',   value: fmt1(d.temp_c),          unit: '°C'  },
    { label: 'Lifetime',      value: fmt1(d.lifetime_kwh),    unit: 'kWh' },
  ];
  return `<tr class="detail-row"><td colspan="8"><div class="detail-grid">${
    fields.map(f => `<div class="detail-item">
      <span class="detail-label">${f.label}</span>
      <span class="detail-value">${f.value}${f.unit ? `<span class="detail-unit">${f.unit}</span>` : ''}</span>
    </div>`).join('')
  }</div></td></tr>`;
}

// ── Panel toggle ──────────────────────────────────────────────
function togglePanel(serial) {
  if (expandedSerials.has(serial)) {
    expandedSerials.delete(serial);
  } else {
    expandedSerials.add(serial);
  }
  renderPanels();
}

document.querySelectorAll('#panels-table thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = true;
    }
    document.querySelectorAll('#panels-table thead th').forEach(h => h.removeAttribute('aria-sort'));
    th.setAttribute('aria-sort', sortAsc ? 'ascending' : 'descending');
    renderPanels();
  });
});

// ── Map ───────────────────────────────────────────────────────
let mapLoaded = false;
let positionToSerial = {}; // e.g. { 'C2': 'E001...' }
let serialToLabel    = {}; // e.g. { 'E001...': 'C2' }

function normalisePosition(pos) {
  // 'C02' → 'C2', 'B20' → 'B20'
  return pos.replace(/^([A-Za-z]+)0*(\d+)$/, (_, l, n) => l.toUpperCase() + parseInt(n, 10));
}

async function initMap() {
  try {
    const [mapResp, csvResp] = await Promise.all([
      fetch(API_BASE + '/assets/map.html'),
      fetch(API_BASE + '/assets/map.csv'),
    ]);
    if (!mapResp.ok || !csvResp.ok) return;

    const mapHtml = await mapResp.text();
    const csvText = await csvResp.text();

    // Parse CSV: Position,Serial (skip header, ignore extra columns)
    csvText.split('\n').slice(1).forEach(line => {
      const parts = line.split(',');
      if (parts.length >= 2) {
        const pos = normalisePosition(parts[0].trim());
        const serial = parts[1].trim();
        if (pos && serial) { positionToSerial[pos] = serial; serialToLabel[serial] = pos; }
      }
    });

    const mapDoc = new DOMParser().parseFromString(mapHtml, 'text/html');
    let css = '';
    mapDoc.querySelectorAll('style').forEach(s => css += s.textContent);
    css = css.replace(/\bbody\b/g, '#map-container');
    const container = document.getElementById('map-container');
    container.innerHTML = '';
    const styleEl = document.createElement('style');
    styleEl.textContent = css;
    container.appendChild(styleEl);
    container.insertAdjacentHTML('beforeend', mapDoc.body.innerHTML);
    document.getElementById('btn-map').style.display = '';
    mapLoaded = true;
  } catch (_) {}
}

async function loadMap() {
  if (!mapLoaded) return;
  const stale = panelsData.length === 0 || Date.now() - panelsFetchedAt > PANELS_TTL_MS;
  let overlay;
  if (panelsData.length === 0) {
    overlay = document.createElement('div');
    overlay.className = 'loading-overlay';
    overlay.innerHTML = '<div class="spinner"></div>';
    document.getElementById('map-layout').appendChild(overlay);
  }
  try {
    if (stale) await fetchDevices();
  } catch (_) {}
  finally { overlay?.remove(); }
  const devices = Object.fromEntries(panelsData.map(d => [d.serial, d]));

  document.querySelectorAll('#map-container .panel').forEach(el => {
    const label = el.textContent.trim();
    const pos   = normalisePosition(label);
    const serial = positionToSerial[pos];
    const dev    = serial ? devices[serial] : null;

    el.classList.remove('state-working', 'state-error', 'state-other', 'state-unknown');
    if (!dev) {
      el.classList.add('state-unknown');
      el.title = label + ': no data';
    } else {
      el.classList.add(dev.state === 'working' ? 'state-working'
                     : dev.state === 'error'   ? 'state-error'
                     : 'state-other');
      el.title = label + ' · ' + dev.state_descr + ' · ' + fmt1(dev.power_kw) + ' kW';
    }

    el.onclick = () => showMapDetail(el, serial, dev, label);
  });
}

function detailField(label, value, unit) {
  return `<div class="detail-item">
    <span class="detail-label">${label}</span>
    <span class="detail-value">${value}${unit ? `<span class="detail-unit">${unit}</span>` : ''}</span>
  </div>`;
}

function detailSection(label, fields) {
  return `<div class="map-detail-section">
    <div class="map-detail-section-label">${label}</div>
    <div class="detail-grid">${fields.map(f => detailField(f.label, f.value, f.unit)).join('')}</div>
  </div>`;
}

function showMapDetail(el, serial, dev, label) {
  document.querySelectorAll('#map-container .panel.selected').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');

  document.getElementById('map-detail-title').textContent = label + (serial ? ' · ' + serial.slice(-6) : '');

  if (!dev) {
    document.getElementById('map-detail-grid').innerHTML =
      '<div class="detail-item"><span class="detail-label">Status</span><span class="detail-value">No data</span></div>';
  } else {
    document.getElementById('map-detail-grid').innerHTML = [
      detailSection('AC Output', [
        { label: 'Power',    value: fmt1(dev.power_kw),   unit: 'kW'  },
        { label: 'Today',    value: fmt1(dev.today_kwh),  unit: 'kWh' },
        { label: 'Current',  value: fmt1(dev.current_a),  unit: 'A'   },
        { label: 'Voltage',  value: fmt1(dev.voltage_v),  unit: 'V'   },
        { label: 'Freq',     value: fmt1(dev.freq_hz),    unit: 'Hz'  },
      ]),
      detailSection('DC Input', [
        { label: 'Power',    value: fmt1(dev.power_mppt1_kw),   unit: 'kW' },
        { label: 'Voltage',  value: fmt1(dev.voltage_mppt1_v),  unit: 'V'  },
        { label: 'Current',  value: fmt1(dev.current_mppt1_a),  unit: 'A'  },
      ]),
      detailSection('Info', [
        { label: 'State',    value: dev.state_descr,        unit: ''    },
        { label: 'Temp',     value: fmt1(dev.temp_c),        unit: '°C'  },
        { label: 'Lifetime', value: fmt1(dev.lifetime_kwh),  unit: 'kWh' },
      ]),
    ].join('');
  }

  document.getElementById('map-detail').classList.add('visible');
}

// ── Range select ──────────────────────────────────────────────
const rangeSelect   = document.getElementById('range-select');
const customRow     = document.getElementById('custom-range');
const customSinceEl = document.getElementById('custom-since');
const customUntilEl = document.getElementById('custom-until');
const applyBtn      = document.getElementById('apply-custom');

function todayStr() { return new Date().toISOString().slice(0, 10); }

rangeSelect.addEventListener('change', () => {
  const val = rangeSelect.value;
  if (val === 'custom') {
    if (!customSinceEl.value) customSinceEl.value = todayStr();
    if (!customUntilEl.value) customUntilEl.value = todayStr();
    customRow.classList.add('visible');
  } else {
    customRow.classList.remove('visible');
    currentRange = val;
    loadRange(currentRange);
  }
});

applyBtn.addEventListener('click', () => {
  const since = customSinceEl.value;
  const until = customUntilEl.value;
  if (!since || !until) return;
  loadRange('custom', since, until);
});

// ── Init ──────────────────────────────────────────────────────
(async () => {
  try {
    const cfg = await fetch('/config.json').then(r => r.json());
    API_BASE = (cfg.api_base || '').replace(/\/$/, '');
  } catch (_) {}
  loadRange('today');
  initMap();
  fetchDevices().catch(() => {});
  setInterval(refreshCurrent, 5000);
  setInterval(() => {
    if (activeTab === 'tab-overview') {
      loadRange(currentRange);
    } else if (activeTab === 'tab-panels') {
      panelsFetchedAt = 0; // force stale so loadPanels re-fetches
      loadPanels();
    } else if (activeTab === 'tab-map') {
      panelsFetchedAt = 0;
      loadMap();
    }
  }, DEVICES_REFRESH_MS);
})();
</script>
