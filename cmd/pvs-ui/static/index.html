<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Monitor</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  <script src="https://code.highcharts.com/modules/export-data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --solar:     #f59e0b;
      --load:      #60a5fa;
      --export:    #34d399;
      --import:    #f87171;
      --radius:    0.5rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 1.25rem; font-weight: 600; }

    #clock { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.9rem; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Tabs ────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      margin-bottom: -1px;
    }

    .tab-btn[aria-selected="true"] {
      border-bottom-color: var(--solar);
      color: var(--text);
      font-weight: 600;
    }

    .tab-btn:focus { outline: 2px solid var(--solar); outline-offset: 2px; }

    .tab-panel { display: none; flex-direction: column; gap: 1.25rem; }
    .tab-panel.active { display: flex; }

    /* ── Current power cards ─────────────────────────────────── */
    .current-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-unit { font-size: 1rem; color: var(--muted); }

    .production .stat-value { color: var(--solar); }
    .usage      .stat-value { color: var(--load); }
    .net-export .stat-value { color: var(--export); }
    .net-import .stat-value { color: var(--import); }

    /* ── Range selector ──────────────────────────────────────── */
    .range-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }

    .range-row label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #range-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.4rem 0.75rem;
    }

    #range-select:focus { outline: 2px solid var(--solar); outline-offset: 2px; }

    .custom-range {
      display: none;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .custom-range.visible { display: flex; }

    .custom-range label { color: var(--muted); font-size: 0.85rem; }

    .custom-range input[type="date"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.35rem 0.6rem;
    }

    .custom-range input[type="date"]:focus { outline: 2px solid var(--solar); outline-offset: 2px; }

    #apply-custom {
      background: var(--solar);
      border: none;
      border-radius: var(--radius);
      color: #000;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem 0.85rem;
    }

    #apply-custom:focus { outline: 2px solid var(--text); outline-offset: 2px; }

    /* ── Chart ───────────────────────────────────────────────── */
    #chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    #chart { height: 380px; }

    #no-data {
      display: none;
      height: 380px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── Summary cards ───────────────────────────────────────── */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .summary-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .summary-value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .summary-unit  { font-size: 0.85rem; color: var(--muted); }

    /* ── Panels table ────────────────────────────────────────── */
    #panels-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
    }

    #panels-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
    }

    #panels-table th, #panels-table td {
      padding: 0.5rem 0.75rem;
      text-align: right;
      white-space: nowrap;
    }

    #panels-table th:first-child, #panels-table td:first-child { text-align: left; }

    #panels-table thead th {
      background: var(--bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
    }

    #panels-table thead th:hover { color: var(--text); }

    #panels-table thead th[aria-sort="ascending"]::after  { content: ' ▲'; }
    #panels-table thead th[aria-sort="descending"]::after { content: ' ▼'; }

    #panels-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    #panels-table tbody tr:hover           { background: rgba(255,255,255,0.05); }

    .state-working { color: var(--export); }
    .state-error   { color: var(--import); }
    .state-other   { color: var(--muted); }

    /* ── Status bar ──────────────────────────────────────────── */
    #status {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding-bottom: 0.75rem;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 700px) {
      .current-stats  { grid-template-columns: 1fr; }
      .summary-cards  { grid-template-columns: repeat(2, 1fr); }
      .stat-value     { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>☀ Solar Monitor</h1>
  <time id="clock" aria-live="off"></time>
</header>

<main>

  <div class="tab-bar" role="tablist" aria-label="Views">
    <button class="tab-btn" role="tab" aria-selected="true"  aria-controls="tab-overview" id="btn-overview">Overview</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-panels"   id="btn-panels">Panels</button>
  </div>

  <!-- Overview tab -->
  <div id="tab-overview" class="tab-panel active" role="tabpanel" aria-labelledby="btn-overview">

    <section aria-label="Current power readings" aria-live="polite" aria-atomic="false" class="current-stats">
      <div class="stat-card production" role="group" aria-label="Solar production">
        <span class="stat-label">Production</span>
        <div class="stat-row">
          <span class="stat-value" id="solar-kw">—</span>
          <span class="stat-unit">kW</span>
        </div>
      </div>
      <div class="stat-card usage" role="group" aria-label="Home usage">
        <span class="stat-label">Usage</span>
        <div class="stat-row">
          <span class="stat-value" id="load-kw">—</span>
          <span class="stat-unit">kW</span>
        </div>
      </div>
      <div class="stat-card" id="net-card" role="group" aria-label="Grid exchange">
        <span class="stat-label" id="net-label">Net</span>
        <div class="stat-row">
          <span class="stat-value" id="net-kw">—</span>
          <span class="stat-unit">kW</span>
        </div>
      </div>
    </section>

    <div class="range-row">
      <label for="range-select">Time range:</label>
      <select id="range-select" aria-label="Select time range">
        <option value="today">Today</option>
        <option value="this_week">This Week</option>
        <option value="this_month">This Month</option>
        <option value="this_year">This Year</option>
        <option value="past_24h">Past 24 Hours</option>
        <option value="past_7d">Past 7 Days</option>
        <option value="past_30d">Past 30 Days</option>
        <option value="past_year">Past Year</option>
        <option value="lifetime">Lifetime</option>
        <option value="custom">Custom…</option>
      </select>
      <div class="custom-range" id="custom-range" role="group" aria-label="Custom date range">
        <label for="custom-since">From</label>
        <input type="date" id="custom-since" aria-label="Start date">
        <label for="custom-until">To</label>
        <input type="date" id="custom-until" aria-label="End date">
        <button id="apply-custom">Apply</button>
      </div>
    </div>

    <section aria-label="Power chart" id="chart-container">
      <div id="chart"></div>
      <div id="no-data" role="status">No data for this period.</div>
    </section>

    <section aria-label="Period summary" class="summary-cards">
      <div class="summary-card" role="group" aria-label="Energy produced">
        <span class="summary-label">Produced</span>
        <span class="summary-value" id="sum-solar">—</span>
        <span class="summary-unit">kWh</span>
      </div>
      <div class="summary-card" role="group" aria-label="Energy consumed">
        <span class="summary-label">Consumed</span>
        <span class="summary-value" id="sum-load">—</span>
        <span class="summary-unit">kWh</span>
      </div>
      <div class="summary-card" role="group" aria-label="Net energy">
        <span class="summary-label">Net</span>
        <span class="summary-value" id="sum-net">—</span>
        <span class="summary-unit">kWh</span>
      </div>
      <div class="summary-card" role="group" aria-label="Average production">
        <span class="summary-label">Avg Production</span>
        <span class="summary-value" id="sum-avg">—</span>
        <span class="summary-unit">kW</span>
      </div>
    </section>

  </div><!-- /tab-overview -->

  <!-- Panels tab -->
  <div id="tab-panels" class="tab-panel" role="tabpanel" aria-labelledby="btn-panels">
    <div id="panels-container">
      <table id="panels-table" aria-label="Panel inverter readings">
        <thead>
          <tr>
            <th scope="col" data-col="serial"       aria-sort="ascending">Serial</th>
            <th scope="col" data-col="state"                              >State</th>
            <th scope="col" data-col="power_kw"                          >Power (kW)</th>
            <th scope="col" data-col="lifetime_kwh"                      >Lifetime (kWh)</th>
            <th scope="col" data-col="voltage_v"                         >Voltage (V)</th>
            <th scope="col" data-col="temp_c"                            >Temp (°C)</th>
          </tr>
        </thead>
        <tbody id="panels-tbody"></tbody>
      </table>
    </div>
  </div><!-- /tab-panels -->

  <p id="status" aria-live="polite"></p>

</main>

<script>
'use strict';

let chart = null;
let currentRange = 'today';

// ── Clock ─────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(tickClock, 1000);
tickClock();

// ── Formatting ────────────────────────────────────────────────
function fmt1(n)  { return n == null ? '—' : n.toFixed(1); }
function fmt2(n)  { return n == null ? '—' : n.toFixed(2); }
function fmtKWh(n){ return n == null ? '—' : n.toFixed(2); }

// ── Tabs ──────────────────────────────────────────────────────
const tabBtns   = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-panel');

function switchTab(id) {
  tabBtns.forEach(b => {
    const active = b.getAttribute('aria-controls') === id;
    b.setAttribute('aria-selected', active);
  });
  tabPanels.forEach(p => p.classList.toggle('active', p.id === id));
  if (id === 'tab-panels') loadPanels();
}

tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.getAttribute('aria-controls'))));

// ── Current reading ───────────────────────────────────────────
function updateCurrent(c) {
  if (!c) return;
  document.getElementById('solar-kw').textContent = fmt1(c.solar_kw);
  document.getElementById('load-kw').textContent  = fmt1(c.load_kw);

  const netKW   = c.net_kw;
  const netEl   = document.getElementById('net-kw');
  const labelEl = document.getElementById('net-label');
  const cardEl  = document.getElementById('net-card');

  const exporting = netKW <= 0;
  netEl.textContent   = fmt1(Math.abs(netKW));
  labelEl.textContent = exporting ? 'Exporting' : 'Importing';
  cardEl.className    = 'stat-card ' + (exporting ? 'net-export' : 'net-import');
  cardEl.setAttribute('aria-label', exporting ? 'Exporting to grid' : 'Importing from grid');

  const age = Math.round((Date.now() - new Date(c.updated_at).getTime()) / 1000);
  let ageStr;
  if      (age < 5)     ageStr = 'just now';
  else if (age < 60)    ageStr = age + 's ago';
  else if (age < 3600)  ageStr = Math.floor(age / 60) + 'm ago';
  else if (age < 86400) ageStr = Math.floor(age / 3600) + 'h ago';
  else                  ageStr = Math.floor(age / 86400) + 'd ago';
  document.getElementById('status').textContent = 'Last reading ' + ageStr;
}

// ── Summary cards ─────────────────────────────────────────────
function updateSummary(s) {
  document.getElementById('sum-solar').textContent = fmtKWh(s.solar_kwh);
  document.getElementById('sum-load').textContent  = fmtKWh(s.load_kwh);
  document.getElementById('sum-avg').textContent   = fmt1(s.avg_solar_kw);

  const netEl = document.getElementById('sum-net');
  const net   = s.net_kwh;
  netEl.textContent = fmtKWh(Math.abs(net));
  netEl.parentElement.querySelector('.summary-unit').textContent =
    net < 0 ? 'kWh exported' : 'kWh imported';
}

// ── Chart ─────────────────────────────────────────────────────
function buildChartOptions(series, rangeLabel, since, until) {
  const solar = series.map(p => [p.t, p.s == null ? null : parseFloat(p.s.toFixed(3))]);
  const load  = series.map(p => [p.t, p.l == null ? null : parseFloat(p.l.toFixed(3))]);

  return {
    time: { useUTC: false },
    chart: {
      backgroundColor: 'transparent',
      style: { fontFamily: 'inherit', color: '#f1f5f9' },
      animation: false,
    },
    title: { text: null },
    credits: { enabled: false },
    legend: {
      itemStyle: { color: '#f1f5f9', fontWeight: 'normal' },
      itemHoverStyle: { color: '#fff' },
    },
    xAxis: {
      type: 'datetime',
      min: since * 1000,
      max: until * 1000,
      lineColor: '#334155',
      tickColor: '#334155',
      labels: { style: { color: '#94a3b8' } },
    },
    yAxis: {
      title: { text: 'kW', style: { color: '#94a3b8' } },
      gridLineColor: '#334155',
      labels: { style: { color: '#94a3b8' }, format: '{value:.1f}' },
      min: 0,
    },
    tooltip: {
      shared: true,
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      style: { color: '#f1f5f9' },
      valueDecimals: 2,
      valueSuffix: ' kW',
    },
    plotOptions: {
      area: { marker: { enabled: false } },
      line: { marker: { enabled: false } },
    },
    series: [
      {
        name: 'Production',
        type: 'area',
        data: solar,
        color: '#f59e0b',
        fillOpacity: 0.15,
        lineWidth: 2,
      },
      {
        name: 'Usage',
        type: 'line',
        data: load,
        color: '#60a5fa',
        lineWidth: 2,
      },
    ],
    accessibility: {
      enabled: true,
      description: 'Solar production and home energy usage over time for ' + rangeLabel + '.',
      point: { valueDescriptionFormat: '{xDescription}: production {point.y:.2f} kW' },
      series: { descriptionFormat: '{seriesDescription}' },
      screenReaderSection: {
        beforeChartFormat:
          '<h3>Solar production and usage — {rangeLabel}</h3>' +
          '<div>Line chart with two series: solar production in amber, home usage in blue.</div>' +
          '<div>{chartLongdesc}</div>',
      },
      keyboardNavigation: { enabled: true },
    },
    exporting: { enabled: false },
  };
}

function renderChart(series, rangeLabel, since, until) {
  const noData  = document.getElementById('no-data');
  const chartEl = document.getElementById('chart');

  if (!series || series.length === 0) {
    chartEl.style.display = 'none';
    noData.style.display  = 'flex';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  chartEl.style.display = 'block';
  noData.style.display  = 'none';

  const opts = buildChartOptions(series, rangeLabel, since, until);
  if (chart) {
    chart.series[0].setData(series.map(p => [p.t, p.s == null ? null : parseFloat(p.s.toFixed(3))]), false);
    chart.series[1].setData(series.map(p => [p.t, p.l == null ? null : parseFloat(p.l.toFixed(3))]), false);
    chart.xAxis[0].setExtremes(since * 1000, until * 1000, false);
    chart.setTitle(null, null, false);
    chart.redraw();
  } else {
    chart = Highcharts.chart('chart', opts);
  }
}

// ── API base ──────────────────────────────────────────────────
let API_BASE = '';

// ── Range resolution ──────────────────────────────────────────
function resolveRange(name, customSince, customUntil) {
  const now   = new Date();
  const y     = now.getFullYear();
  const m     = now.getMonth();
  const d     = now.getDate();
  const today = new Date(y, m, d);
  const until = Math.floor(now / 1000);

  switch (name) {
    case 'today':
      return { since: Math.floor(today / 1000), until, label: 'Today' };
    case 'this_week': {
      const dow = now.getDay();
      return { since: Math.floor(new Date(y, m, d - dow) / 1000), until, label: 'This Week' };
    }
    case 'this_month':
      return { since: Math.floor(new Date(y, m, 1) / 1000), until, label: 'This Month' };
    case 'this_year':
      return { since: Math.floor(new Date(y, 0, 1) / 1000), until, label: 'This Year' };
    case 'past_24h':
      return { since: until - 86400, until, label: 'Past 24 Hours' };
    case 'past_7d':
      return { since: until - 7 * 86400, until, label: 'Past 7 Days' };
    case 'past_30d':
      return { since: until - 30 * 86400, until, label: 'Past 30 Days' };
    case 'past_year':
      return { since: Math.floor(new Date(y - 1, m, d) / 1000), until, label: 'Past Year' };
    case 'lifetime':
      return { since: 0, until, label: 'Lifetime' };
    case 'custom': {
      const s = Math.floor(new Date(customSince) / 1000);
      const u = Math.floor(new Date(customUntil) / 1000) + 86399;
      return { since: s, until: u, label: customSince + ' – ' + customUntil };
    }
    default:
      return { since: Math.floor(today / 1000), until, label: 'Today' };
  }
}

// ── Overview data loading ─────────────────────────────────────
async function loadRange(name, customSince, customUntil) {
  const { since, until, label } = resolveRange(name, customSince, customUntil);
  try {
    const url = API_BASE + '/api/data?since=' + since + '&until=' + until;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    updateCurrent(data.current);
    updateSummary(data.summary);
    const chartSince = data.earliest_at ? Math.max(since, Math.floor(new Date(data.earliest_at) / 1000)) : since;
    renderChart(data.series, label, chartSince, until);
  } catch (e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

async function refreshCurrent() {
  try {
    const resp = await fetch(API_BASE + '/api/current');
    if (!resp.ok) return;
    updateCurrent(await resp.json());
  } catch (_) {}
}

// ── Panels table ──────────────────────────────────────────────
let panelsData   = [];
let sortCol      = 'serial';
let sortAsc      = true;

async function loadPanels() {
  try {
    const resp = await fetch(API_BASE + '/api/devices');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    panelsData = await resp.json();
    renderPanels();
  } catch (e) {
    document.getElementById('panels-tbody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;color:var(--muted)">Error: ' + e.message + '</td></tr>';
  }
}

function renderPanels() {
  const cols = {
    serial:       d => d.serial,
    state:        d => d.state_descr,
    power_kw:     d => d.power_kw,
    lifetime_kwh: d => d.lifetime_kwh,
    voltage_v:    d => d.voltage_v,
    temp_c:       d => d.temp_c,
  };

  const sorted = [...panelsData].sort((a, b) => {
    const av = cols[sortCol](a);
    const bv = cols[sortCol](b);
    const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
    return sortAsc ? cmp : -cmp;
  });

  const tbody = document.getElementById('panels-tbody');
  tbody.innerHTML = sorted.map(d => {
    const stateClass = d.state === 'working' ? 'state-working'
                     : d.state === 'error'   ? 'state-error'
                     : 'state-other';
    return `<tr>
      <td>${d.serial}</td>
      <td class="${stateClass}">${d.state_descr}</td>
      <td>${fmt2(d.power_kw)}</td>
      <td>${fmt2(d.lifetime_kwh)}</td>
      <td>${fmt1(d.voltage_v)}</td>
      <td>${fmt1(d.temp_c)}</td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('#panels-table thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = true;
    }
    document.querySelectorAll('#panels-table thead th').forEach(h => h.removeAttribute('aria-sort'));
    th.setAttribute('aria-sort', sortAsc ? 'ascending' : 'descending');
    renderPanels();
  });
});

// ── Range select ──────────────────────────────────────────────
const rangeSelect   = document.getElementById('range-select');
const customRow     = document.getElementById('custom-range');
const customSinceEl = document.getElementById('custom-since');
const customUntilEl = document.getElementById('custom-until');
const applyBtn      = document.getElementById('apply-custom');

function todayStr() { return new Date().toISOString().slice(0, 10); }

rangeSelect.addEventListener('change', () => {
  const val = rangeSelect.value;
  if (val === 'custom') {
    if (!customSinceEl.value) customSinceEl.value = todayStr();
    if (!customUntilEl.value) customUntilEl.value = todayStr();
    customRow.classList.add('visible');
  } else {
    customRow.classList.remove('visible');
    currentRange = val;
    loadRange(currentRange);
  }
});

applyBtn.addEventListener('click', () => {
  const since = customSinceEl.value;
  const until = customUntilEl.value;
  if (!since || !until) return;
  loadRange('custom', since, until);
});

// ── Init ──────────────────────────────────────────────────────
(async () => {
  try {
    const cfg = await fetch('/config.json').then(r => r.json());
    API_BASE = (cfg.api_base || '').replace(/\/$/, '');
  } catch (_) {}
  loadRange('today');
  setInterval(refreshCurrent, 5000);
})();
</script>
