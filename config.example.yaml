# pvs-monitor example configuration
# Copy to ~/.config/pvs-monitor/config.yaml and adjust for your system.

# PVS6 WebSocket address (ws://your-pvs6-ip:9002)
addr: ws://192.168.1.100:9002

# Reconnect backoff settings
reconnect_initial_interval: 1s
reconnect_max_interval: 30s

# Error if no reading has arrived within this window
stale_threshold: 5s

# Device list HTTP poller (optional — provides per-device data)
# Leave password empty to disable.
# The url should use the same IP as your WebSocket addr (http://your-pvs6-ip).
device_list:
  url: http://192.168.1.100     # must match the IP from addr above
  interval: 60s
  username: ssm_owner
  password: ""                   # last 5 characters of your PVS serial number
  # tls_fingerprint pins the PVS6 TLS certificate (SHA-256, colons optional).
  # Obtain with: openssl s_client -connect your-pvs6-ip:443 </dev/null 2>/dev/null \
  #   | openssl x509 -noout -fingerprint -sha256
  # When set, MITM attacks are detected even though the cert is self-signed.
  # tls_fingerprint: "AA:BB:CC:..."
